name: Deploy to EC2

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      skip_migrate:
        description: "Skip prisma migrate deploy"
        type: boolean
        default: false

concurrency:
  group: deploy-prod
  cancel-in-progress: false

env:
  AWS_REGION: ap-south-1
  ECR_REPO: crackgate-prod-web

jobs:
  # ─── Lint + typecheck — fail fast before paying for build minutes ──────
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci --no-audit --no-fund
      - run: npx --workspace @crackgate/database prisma generate
      - run: npm run --workspace apps/web lint
      - run: npm run --workspace apps/web typecheck

  # ─── Build linux/arm64 image (matches t4g.small) and push to ECR ───────
  build:
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      id-token: write       # OIDC → AWS, no long-lived keys
      contents: read
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}
      image_uri: ${{ steps.meta.outputs.uri }}
    steps:
      - uses: actions/checkout@v4

      - id: meta
        run: |
          TAG="sha-$(echo $GITHUB_SHA | cut -c1-7)"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "uri=${{ secrets.ECR_REGISTRY }}/${{ env.ECR_REPO }}:$TAG" >> $GITHUB_OUTPUT

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: aws-actions/amazon-ecr-login@v2
        id: ecr

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          platforms: linux/arm64
          push: true
          tags: |
            ${{ steps.meta.outputs.uri }}
            ${{ secrets.ECR_REGISTRY }}/${{ env.ECR_REPO }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_GOOGLE_ENABLED=${{ vars.NEXT_PUBLIC_GOOGLE_ENABLED }}
            NEXT_PUBLIC_WHATSAPP_ENABLED=${{ vars.NEXT_PUBLIC_WHATSAPP_ENABLED }}
            NEXT_PUBLIC_WHATSAPP_NUMBER=${{ vars.NEXT_PUBLIC_WHATSAPP_NUMBER }}
            NEXT_PUBLIC_WHATSAPP_COMMUNITY_URL=${{ vars.NEXT_PUBLIC_WHATSAPP_COMMUNITY_URL }}
            NEXT_PUBLIC_RAZORPAY_KEY_ID=${{ vars.NEXT_PUBLIC_RAZORPAY_KEY_ID }}
            NEXT_PUBLIC_UPI_VPA=${{ vars.NEXT_PUBLIC_UPI_VPA }}
            NEXT_PUBLIC_UPI_PAYEE_NAME=${{ vars.NEXT_PUBLIC_UPI_PAYEE_NAME }}
            NEXT_PUBLIC_POSTHOG_KEY=${{ secrets.NEXT_PUBLIC_POSTHOG_KEY }}
            NEXT_PUBLIC_POSTHOG_HOST=${{ vars.NEXT_PUBLIC_POSTHOG_HOST }}

  # ─── SSH to EC2, pull, migrate, restart web, healthcheck ───────────────
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Install SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Copy compose + Caddyfile
        run: |
          scp -i ~/.ssh/id_ed25519 \
            docker-compose.aws.yml Caddyfile \
            deploy@${{ secrets.EC2_HOST }}:/opt/crackgate/

      - name: Deploy
        env:
          IMAGE_TAG: ${{ needs.build.outputs.image_tag }}
          SKIP_MIGRATE: ${{ inputs.skip_migrate || 'false' }}
        run: |
          ssh -i ~/.ssh/id_ed25519 deploy@${{ secrets.EC2_HOST }} bash -se <<EOF
            set -euo pipefail
            cd /opt/crackgate

            # Refresh ECR auth (token TTL = 12h)
            aws ecr get-login-password --region ${{ env.AWS_REGION }} \
              | docker login --username AWS --password-stdin ${{ secrets.ECR_REGISTRY }}

            # Pin image tag for this deploy
            export IMAGE_TAG="${IMAGE_TAG}"
            sed -i "s|^IMAGE_TAG=.*|IMAGE_TAG=${IMAGE_TAG}|" .env.production || \
              echo "IMAGE_TAG=${IMAGE_TAG}" >> .env.production

            docker compose -f docker-compose.aws.yml --env-file .env.production pull web

            # Run migrations BEFORE swapping web (uses DIRECT_URL → bypasses pgbouncer)
            if [ "\${SKIP_MIGRATE}" != "true" ]; then
              docker compose -f docker-compose.aws.yml --env-file .env.production \\
                run --rm web npx prisma migrate deploy --schema=packages/database/prisma/schema.prisma
            fi

            # Zero-downtime web swap (Caddy keeps serving during ~5s gap)
            docker compose -f docker-compose.aws.yml --env-file .env.production \\
              up -d --no-deps --force-recreate web

            # Wait for /api/healthz
            for i in {1..30}; do
              if docker compose -f docker-compose.aws.yml exec -T web \\
                 curl -fsS http://127.0.0.1:3000/api/healthz >/dev/null 2>&1; then
                echo "✓ healthy after \${i} attempts"
                docker image prune -af --filter "until=168h"
                exit 0
              fi
              sleep 2
            done

            echo "✗ health check failed — rolling back"
            sed -i "s|^IMAGE_TAG=.*|IMAGE_TAG=latest|" .env.production
            docker compose -f docker-compose.aws.yml --env-file .env.production \\
              up -d --no-deps web
            exit 1
          EOF

      - name: Notify on failure
        if: failure()
        run: |
          curl -X POST "${{ secrets.SLACK_WEBHOOK_URL }}" \
            -H 'Content-Type: application/json' \
            -d "{\"text\":\":rotating_light: CrackGate deploy failed — ${{ github.sha }}\"}"
