name: Deploy to EC2

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      skip_migrate:
        description: "Skip prisma migrate deploy"
        type: boolean
        default: false

concurrency:
  group: deploy-prod
  cancel-in-progress: false

env:
  AWS_REGION: ap-south-1
  ECR_REPO: crackgate-prod-web

jobs:
  # ─── Lint + typecheck — fail fast before paying for build minutes ──────
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
      - run: npm ci --no-audit --no-fund
      - run: npx --workspace @crackgate/database prisma generate
      - run: npm run --workspace apps/web lint
      - run: npm run --workspace apps/web typecheck
      - run: npm run --workspace apps/web test
      # Informational dependency audit — surfaces advisories without blocking the
      # required check (Dependabot opens the actual upgrade PRs).
      - name: npm audit (non-blocking)
        run: npm audit --omit=dev --audit-level=high || true

  # ─── Build linux/arm64 image (matches t4g.small) and push to ECR ───────
  # Runs on a NATIVE arm64 runner so the Next.js build executes directly,
  # not under QEMU emulation. QEMU cross-builds were flaky here: the build
  # worker intermittently crashed with `SIGILL / qemu: uncaught target
  # signal 4 (Illegal instruction)`. Native arm64 removes the emulator and
  # is also ~4-5x faster.
  build:
    needs: verify
    # PRs run `verify` only (lint + typecheck). Build + deploy are reserved for
    # pushes to main and manual dispatch — we never build/deploy from a PR.
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-24.04-arm
    permissions:
      id-token: write       # OIDC → AWS, no long-lived keys
      contents: read
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}
      image_uri: ${{ steps.meta.outputs.uri }}
    steps:
      - uses: actions/checkout@v6

      - id: meta
        run: |
          TAG="sha-$(echo $GITHUB_SHA | cut -c1-7)"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "uri=${{ secrets.ECR_REGISTRY }}/${{ env.ECR_REPO }}:$TAG" >> $GITHUB_OUTPUT

      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: aws-actions/amazon-ecr-login@v2
        id: ecr

      - uses: docker/setup-buildx-action@v4

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/arm64
          push: true
          tags: |
            ${{ steps.meta.outputs.uri }}
            ${{ secrets.ECR_REGISTRY }}/${{ env.ECR_REPO }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_GOOGLE_ENABLED=${{ vars.NEXT_PUBLIC_GOOGLE_ENABLED }}
            NEXT_PUBLIC_WHATSAPP_ENABLED=${{ vars.NEXT_PUBLIC_WHATSAPP_ENABLED }}
            NEXT_PUBLIC_WHATSAPP_NUMBER=${{ vars.NEXT_PUBLIC_WHATSAPP_NUMBER }}
            NEXT_PUBLIC_WHATSAPP_COMMUNITY_URL=${{ vars.NEXT_PUBLIC_WHATSAPP_COMMUNITY_URL }}
            NEXT_PUBLIC_RAZORPAY_KEY_ID=${{ vars.NEXT_PUBLIC_RAZORPAY_KEY_ID }}
            NEXT_PUBLIC_UPI_VPA=${{ vars.NEXT_PUBLIC_UPI_VPA }}
            NEXT_PUBLIC_UPI_PAYEE_NAME=${{ vars.NEXT_PUBLIC_UPI_PAYEE_NAME }}
            NEXT_PUBLIC_POSTHOG_KEY=${{ secrets.NEXT_PUBLIC_POSTHOG_KEY }}
            NEXT_PUBLIC_POSTHOG_HOST=${{ vars.NEXT_PUBLIC_POSTHOG_HOST }}
            NEXT_PUBLIC_SENTRY_DSN=${{ secrets.NEXT_PUBLIC_SENTRY_DSN }}

  # ─── SSH to EC2, pull, migrate, restart web, healthcheck ───────────────
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v6

      - name: Install SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Copy compose + Caddyfile
        run: |
          scp -i ~/.ssh/id_ed25519 \
            docker-compose.aws.yml Caddyfile \
            deploy@${{ secrets.EC2_HOST }}:/opt/crackgate/

      - name: Deploy
        env:
          IMAGE_TAG: ${{ needs.build.outputs.image_tag }}
          SKIP_MIGRATE: ${{ inputs.skip_migrate || 'false' }}
          ADMIN_EMAILS: ${{ vars.ADMIN_EMAILS }}
        run: |
          ssh -i ~/.ssh/id_ed25519 deploy@${{ secrets.EC2_HOST }} bash -se <<EOF
            set -euo pipefail
            cd /opt/crackgate

            # Refresh ECR auth (token TTL = 12h)
            aws ecr get-login-password --region ${{ env.AWS_REGION }} \
              | docker login --username AWS --password-stdin ${{ secrets.ECR_REGISTRY }}

            # Pin image tag for this deploy
            export IMAGE_TAG="${IMAGE_TAG}"
            sed -i "s|^IMAGE_TAG=.*|IMAGE_TAG=${IMAGE_TAG}|" .env.production || \
              echo "IMAGE_TAG=${IMAGE_TAG}" >> .env.production

            # Sync admin allowlist from CI (GitHub repo variable ADMIN_EMAILS).
            # Only when non-empty so a missing CI var never wipes a host-set value.
            if [ -n "${ADMIN_EMAILS}" ]; then
              if grep -q '^ADMIN_EMAILS=' .env.production; then
                sed -i "s|^ADMIN_EMAILS=.*|ADMIN_EMAILS=\"${ADMIN_EMAILS}\"|" .env.production
              else
                echo "ADMIN_EMAILS=\"${ADMIN_EMAILS}\"" >> .env.production
              fi
            fi

            # Reclaim disk before pulling. Old image versions accumulate on
            # the small root volume and can fill it mid-pull ("no space left on
            # device"). Images in use by the running web/db/caddy containers are
            # kept; only unused images and build cache are removed.
            docker image prune -af
            docker builder prune -af

            docker compose -f docker-compose.aws.yml --env-file .env.production pull web
            # NOTE: -T + '</dev/null' are REQUIRED. Without them, 'compose run'
            # attaches to stdin and swallows the rest of this heredoc (the
            # force-recreate + healthcheck below), so the container is never
            # swapped yet the job still exits 0. (Cost us a week of "phantom"
            # green deploys that never updated the running container.)
            if [ "${SKIP_MIGRATE}" != "true" ]; then
              docker compose -f docker-compose.aws.yml --env-file .env.production \\
                run --rm -T web node ./node_modules/prisma/build/index.js migrate deploy --schema=packages/database/prisma/schema.prisma </dev/null
            fi

            # Zero-downtime web swap (Caddy keeps serving during ~5s gap)
            docker compose -f docker-compose.aws.yml --env-file .env.production \\
              up -d --no-deps --force-recreate web

            # Guard: assert the swap actually landed the expected image. The old
            # container is "healthy" too, so the healthcheck alone can't catch a
            # missed recreate — verify the image tag explicitly.
            GOT=\$(docker inspect --format '{{.Config.Image}}' \$(docker compose -f docker-compose.aws.yml --env-file .env.production ps -q web))
            case "\$GOT" in
              *":${IMAGE_TAG}") echo "✓ web recreated on \$GOT" ;;
              *) echo "✗ expected :${IMAGE_TAG} but web is \$GOT — recreate failed"; exit 1 ;;
            esac

            # Wait for /api/healthz
            # NOTE: --env-file is REQUIRED here too. Without it, 'compose exec'
            # tries to re-interpolate the compose file and dies on the first
            # unset var (RDS_HOST), so EVERY probe fails and we roll back a
            # container that is actually healthy (false negative).
            for i in {1..30}; do
              if docker compose -f docker-compose.aws.yml --env-file .env.production exec -T web \\
                 curl -fsS http://127.0.0.1:3000/api/healthz >/dev/null 2>&1; then
                echo "✓ healthy after \${i} attempts"
                docker image prune -af --filter "until=168h"
                exit 0
              fi
              sleep 2
            done

            echo "✗ health check failed — rolling back"
            sed -i "s|^IMAGE_TAG=.*|IMAGE_TAG=latest|" .env.production
            docker compose -f docker-compose.aws.yml --env-file .env.production \\
              up -d --no-deps web
            exit 1
          EOF

      - name: Notify on failure
        if: failure()
        run: |
          curl -X POST "${{ secrets.SLACK_WEBHOOK_URL }}" \
            -H 'Content-Type: application/json' \
            -d "{\"text\":\":rotating_light: CrackGate deploy failed — ${{ github.sha }}\"}"

  # ─── Post-deploy smoke test — render critical pages on the live site ───
  # Runs Playwright against the deployed URL (no DB needed in CI). Catches
  # white-screen / 500 regressions the in-container healthcheck can miss.
  smoke:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
      - run: npm ci --no-audit --no-fund
      - run: npx --workspace apps/web playwright install --with-deps chromium
      - name: Smoke test production
        env:
          PLAYWRIGHT_BASE_URL: https://crackgate.in
        run: npm run --workspace apps/web test:e2e

      - name: Notify on failure
        if: failure()
        run: |
          curl -X POST "${{ secrets.SLACK_WEBHOOK_URL }}" \
            -H 'Content-Type: application/json' \
            -d "{\"text\":\":warning: CrackGate post-deploy smoke test failed — ${{ github.sha }}\"}"

