# CrackGate production stack — single-host deploy
#
#   web    : Next.js (frontend + API + auth)
#   db     : PostgreSQL 16
#   caddy  : reverse proxy + auto Let's Encrypt TLS
#
# Run on the VPS:  docker compose --env-file .env.production up -d --build
#
# NOTE on NEXT_PUBLIC_*: these are passed as `build.args`, NOT runtime env.
# Next.js inlines them into the client bundle at build time. Changing them
# requires a rebuild: `docker compose --env-file .env.production build web`.

name: crackgate

networks:
  crackgate-net:
    driver: bridge

volumes:
  pgdata:
  redis_data:
  caddy_data:
  caddy_config:

services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-crackgate}
      POSTGRES_USER: ${POSTGRES_USER:-crackgate}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env.production}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - crackgate-net
    # Not exposed to the host — only the `web` container can reach it.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-crackgate} -d ${POSTGRES_DB:-crackgate}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: always
    volumes:
      - redis_data:/data
    networks:
      - crackgate-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # NEXT_PUBLIC_* are baked into the client JS bundle at build time.
        # IMPORTANT: POSTGRES_PASSWORD must be hex-only (no +/=@:) — see DEPLOY.md.
        NEXT_PUBLIC_GOOGLE_ENABLED:         ${NEXT_PUBLIC_GOOGLE_ENABLED:-1}
        NEXT_PUBLIC_WHATSAPP_ENABLED:       ${NEXT_PUBLIC_WHATSAPP_ENABLED:-0}
        NEXT_PUBLIC_WHATSAPP_NUMBER:        ${NEXT_PUBLIC_WHATSAPP_NUMBER:-}
        NEXT_PUBLIC_WHATSAPP_COMMUNITY_URL: ${NEXT_PUBLIC_WHATSAPP_COMMUNITY_URL:-}
        NEXT_PUBLIC_RAZORPAY_KEY_ID:        ${NEXT_PUBLIC_RAZORPAY_KEY_ID:-}
        NEXT_PUBLIC_UPI_VPA:                ${NEXT_PUBLIC_UPI_VPA:-}
        NEXT_PUBLIC_UPI_PAYEE_NAME:         ${NEXT_PUBLIC_UPI_PAYEE_NAME:-CrackGate}
        NEXT_PUBLIC_POSTHOG_KEY:            ${NEXT_PUBLIC_POSTHOG_KEY:-}
        NEXT_PUBLIC_POSTHOG_HOST:           ${NEXT_PUBLIC_POSTHOG_HOST:-}
        NEXT_PUBLIC_DEV_TOOLS:              ""
    restart: always
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      # Server-side secrets only — NEXT_PUBLIC_* belong in build args above.
      DATABASE_URL: postgresql://${POSTGRES_USER:-crackgate}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-crackgate}?schema=public&connection_limit=10&pool_timeout=10
      REDIS_URL: redis://redis:6379
      NODE_ENV: production
      # NextAuth
      AUTH_URL: ${AUTH_URL}
      AUTH_SECRET: ${AUTH_SECRET}
      AUTH_TRUST_HOST: "true"
      # Google OAuth (server-side half of NEXT_PUBLIC_GOOGLE_ENABLED)
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      # Founder/admin elevation — comma-separated emails get role=admin on login.
      ADMIN_EMAILS: ${ADMIN_EMAILS:-}
      # Razorpay (server-side; public key id is also a build arg)
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET}
      RAZORPAY_WEBHOOK_SECRET: ${RAZORPAY_WEBHOOK_SECRET}
      # Observability (server-side DSN; PostHog public bits are build args)
      SENTRY_DSN: ${SENTRY_DSN:-}
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:3000/api/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - crackgate-net
    # Not exposed on the host; only Caddy reaches it on the docker network.

  caddy:
    image: caddy:2-alpine
    restart: always
    depends_on:
      web:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      DOMAIN: ${DOMAIN:-crackgate.in}
      ACME_EMAIL: ${ACME_EMAIL:?set ACME_EMAIL in .env.production}
    networks:
      - crackgate-net
